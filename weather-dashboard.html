<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        #cityInput {
            flex: 1;
            border: 2px solid #e0e0e0;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #cityInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 30px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .favorites {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .favorite-btn {
            padding: 8px 15px;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .favorite-btn:hover {
            background: #667eea;
            color: white;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .weather-main {
            text-align: center;
            grid-column: 1 / -1;
        }

        .city-name {
            font-size: 2em;
            color: #333;
            margin-bottom: 5px;
        }

        .coordinates {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 4em;
            margin: 20px 0;
        }

        .temperature {
            font-size: 3.5em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .temp-range {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.3em;
            color: #555;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #666;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 500;
        }

        .metric-value {
            color: #667eea;
            font-weight: 600;
        }

        .hourly-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            grid-column: 1 / -1;
        }

        .hour-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .hour-item:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
        }

        .hour-time {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .hour-icon {
            font-size: 2em;
            margin: 10px 0;
        }

        .hour-temp {
            font-size: 0.9em;
        }

        .daily-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            grid-column: 1 / -1;
        }

        .day-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .day-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .day-name {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .day-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }

        .day-temps {
            font-size: 0.9em;
        }

        .day-high {
            color: #ffd700;
        }

        .day-low {
            color: #87ceeb;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            grid-column: 1 / -1;
        }

        canvas {
            max-width: 100%;
        }

        .alerts {
            grid-column: 1 / -1;
        }

        .alert-item {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            color: #856404;
        }

        .uv-index {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .uv-low { color: #4caf50; }
        .uv-moderate { color: #ffc107; }
        .uv-high { color: #ff9800; }
        .uv-very-high { color: #f44336; }
        .uv-extreme { color: #9c27b0; }

        .footer {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .temperature {
                font-size: 2.5em;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .weather-main {
                grid-column: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time weather information from Open-Meteo API</p>
        </div>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name (e.g., London, New York, Tokyo...)" 
                    value="London"
                >
                <button class="btn" onclick="searchWeather()">Search</button>
            </div>
        </div>

        <div class="favorites">
            <button class="favorite-btn" onclick="loadCity('London')">London</button>
            <button class="favorite-btn" onclick="loadCity('New York')">New York</button>
            <button class="favorite-btn" onclick="loadCity('Tokyo')">Tokyo</button>
            <button class="favorite-btn" onclick="loadCity('Paris')">Paris</button>
            <button class="favorite-btn" onclick="loadCity('Sydney')">Sydney</button>
            <button class="favorite-btn" onclick="loadCity('Dubai')">Dubai</button>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="dashboard" class="dashboard-grid" style="display: none;">
            <!-- Weather cards will be populated here -->
        </div>
    </div>

    <div class="footer">
        <p>Data provided by <a href="https://open-meteo.com" target="_blank" style="color: white; text-decoration: underline;">Open-Meteo API</a> | Last updated: <span id="updateTime">--:--</span></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let charts = [];
        let currentWeatherData = null;

        // Geocoding function to get coordinates from city name
        async function getCoordinates(cityName) {
            try {
                const response = await fetch(
                    `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=en&format=json`
                );
                const data = await response.json();
                
                if (!data.results || data.results.length === 0) {
                    throw new Error(`City "${cityName}" not found`);
                }

                const result = data.results[0];
                return {
                    latitude: result.latitude,
                    longitude: result.longitude,
                    name: result.name,
                    country: result.country,
                    timezone: result.timezone
                };
            } catch (error) {
                throw new Error(`Failed to find city: ${error.message}`);
            }
        }

        // Fetch weather data from Open-Meteo API
        async function fetchWeatherData(latitude, longitude, timezone) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&hourly=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,uv_index_max&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation,pressure_msl,uv_index&timezone=${timezone}&forecast_days=7`
                );
                const data = await response.json();
                return data;
            } catch (error) {
                throw new Error(`Failed to fetch weather data: ${error.message}`);
            }
        }

        // WMO Weather code to description
        function getWeatherDescription(code) {
            const codes = {
                0: { desc: 'Clear sky', icon: '☀️' },
                1: { desc: 'Mainly clear', icon: '🌤️' },
                2: { desc: 'Partly cloudy', icon: '⛅' },
                3: { desc: 'Overcast', icon: '☁️' },
                45: { desc: 'Foggy', icon: '🌫️' },
                48: { desc: 'Depositing rime fog', icon: '🌫️' },
                51: { desc: 'Light drizzle', icon: '🌧️' },
                53: { desc: 'Moderate drizzle', icon: '🌧️' },
                55: { desc: 'Dense drizzle', icon: '🌧️' },
                61: { desc: 'Slight rain', icon: '🌧️' },
                63: { desc: 'Moderate rain', icon: '🌧️' },
                65: { desc: 'Heavy rain', icon: '⛈️' },
                71: { desc: 'Slight snow', icon: '🌨️' },
                73: { desc: 'Moderate snow', icon: '🌨️' },
                75: { desc: 'Heavy snow', icon: '🌨️' },
                77: { desc: 'Snow grains', icon: '🌨️' },
                80: { desc: 'Slight rain showers', icon: '🌧️' },
                81: { desc: 'Moderate rain showers', icon: '🌧️' },
                82: { desc: 'Violent rain showers', icon: '⛈️' },
                85: { desc: 'Slight snow showers', icon: '🌨️' },
                86: { desc: 'Heavy snow showers', icon: '🌨️' },
                95: { desc: 'Thunderstorm', icon: '⛈️' },
                96: { desc: 'Thunderstorm with slight hail', icon: '⛈️' },
                99: { desc: 'Thunderstorm with heavy hail', icon: '⛈️' },
            };
            return codes[code] || { desc: 'Unknown', icon: '❓' };
        }

        // Get UV index category
        function getUVCategory(index) {
            if (index < 3) return { category: 'Low', class: 'uv-low' };
            if (index < 6) return { category: 'Moderate', class: 'uv-moderate' };
            if (index < 8) return { category: 'High', class: 'uv-high' };
            if (index < 11) return { category: 'Very High', class: 'uv-very-high' };
            return { category: 'Extreme', class: 'uv-extreme' };
        }

        // Display weather data
        function displayWeather(locationInfo, weatherData) {
            const current = weatherData.current;
            const hourly = weatherData.hourly;
            const daily = weatherData.daily;
            const weather = getWeatherDescription(current.weather_code);
            const uvInfo = getUVCategory(current.uv_index);

            let html = `
                <div class="card weather-main">
                    <div class="city-name">${locationInfo.name}, ${locationInfo.country}</div>
                    <div class="coordinates">Lat: ${locationInfo.latitude.toFixed(2)}°, Lon: ${locationInfo.longitude.toFixed(2)}°</div>
                    <div class="weather-icon">${weather.icon}</div>
                    <div class="temperature">${Math.round(current.temperature_2m)}°C</div>
                    <div class="temp-range">
                        Max: ${Math.round(daily.temperature_2m_max[0])}°C | 
                        Min: ${Math.round(daily.temperature_2m_min[0])}°C
                    </div>
                    <div class="weather-description">${weather.desc}</div>
                </div>

                <div class="card">
                    <div class="card-title">📊 Current Conditions</div>
                    <div class="metric">
                        <span class="metric-label">Temperature</span>
                        <span class="metric-value">${current.temperature_2m}°C</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Humidity</span>
                        <span class="metric-value">${current.relative_humidity_2m}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Wind Speed</span>
                        <span class="metric-value">${current.wind_speed_10m} km/h</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Precipitation</span>
                        <span class="metric-value">${current.precipitation} mm</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Pressure</span>
                        <span class="metric-value">${current.pressure_msl} hPa</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">UV Index</span>
                        <span class="metric-value ${uvInfo.class}">
                            ${current.uv_index.toFixed(1)} (${uvInfo.category})
                        </span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">⏰ Hourly Forecast (Next 24 Hours)</div>
                    <div class="hourly-forecast">
            `;

            // Add hourly forecast
            for (let i = 0; i < 24; i++) {
                const weatherCode = hourly.weather_code[i];
                const weatherDesc = getWeatherDescription(weatherCode);
                const time = new Date(hourly.time[i]).getHours();
                
                html += `
                    <div class="hour-item">
                        <div class="hour-time">${String(time).padStart(2, '0')}:00</div>
                        <div class="hour-icon">${weatherDesc.icon}</div>
                        <div class="hour-temp">${Math.round(hourly.temperature_2m[i])}°C</div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">📅 7-Day Forecast</div>
                    <div class="daily-forecast">
            `;

            // Add daily forecast
            const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            for (let i = 0; i < 7; i++) {
                const date = new Date(daily.time[i]);
                const weatherCode = daily.weather_code[i];
                const weatherDesc = getWeatherDescription(weatherCode);
                const dayName = dayNames[date.getDay()];
                
                html += `
                    <div class="day-item">
                        <div class="day-name">${dayName}</div>
                        <div>${date.getDate()}</div>
                        <div class="day-icon">${weatherDesc.icon}</div>
                        <div class="day-temps">
                            <div class="day-high">${Math.round(daily.temperature_2m_max[i])}°</div>
                            <div class="day-low">${Math.round(daily.temperature_2m_min[i])}°</div>
                        </div>
                    </div>
                `;
            }

            html += `
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">💧 Precipitation & Wind</div>
                    <div class="metric">
                        <span class="metric-label">Today's Precipitation</span>
                        <span class="metric-value">${daily.precipitation_sum[0]} mm</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Max Wind Speed (Today)</span>
                        <span class="metric-value">${daily.wind_speed_10m_max[0]} km/h</span>
                    </div>
                </div>
            `;

            document.getElementById('dashboard').innerHTML = html;
            document.getElementById('dashboard').style.display = 'grid';
            
            // Update time
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            currentWeatherData = weatherData;
        }

        // Search weather
        async function searchWeather() {
            const cityName = document.getElementById('cityInput').value.trim();
            if (!cityName) {
                showError('Please enter a city name');
                return;
            }
            loadCity(cityName);
        }

        // Load city weather
        async function loadCity(cityName) {
            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('cityInput').value = cityName;

            try {
                // Get coordinates
                const locationInfo = await getCoordinates(cityName);
                
                // Fetch weather data
                const weatherData = await fetchWeatherData(
                    locationInfo.latitude,
                    locationInfo.longitude,
                    locationInfo.timezone
                );

                // Display weather
                displayWeather(locationInfo, weatherData);
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                showError(error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '❌ Error: ' + message;
            errorDiv.style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        // Enter key support
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            loadCity('London');
        });
    </script>
</body>
</html>
