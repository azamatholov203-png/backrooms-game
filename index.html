<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Backrooms: Reality Collapse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 1200px;
            height: 800px;
            background: #2a2a2a;
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            background: linear-gradient(135deg, #f4e4a6 0%, #d4b896 100%);
            filter: contrast(1.1) saturate(0.9);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            z-index: 100;
            font-weight: bold;
        }

        .hud-item {
            margin-bottom: 8px;
            padding: 5px;
            border-left: 3px solid #00ff00;
            padding-left: 10px;
        }

        #mindBar {
            width: 150px;
            height: 20px;
            border: 2px solid #00ff00;
            background: #0a0a0a;
            position: relative;
            margin-top: 5px;
        }

        #mindFill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #ffff00);
            width: 100%;
            transition: width 0.3s;
        }

        #mindFill.danger {
            background: linear-gradient(90deg, #ff0000, #ff6600);
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #inventory {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #00ff00;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .item-slot {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 1px solid #00ff00;
            margin-right: 5px;
            text-align: center;
            line-height: 30px;
            font-size: 10px;
            background: rgba(0, 255, 0, 0.1);
        }

        #distanceText {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff6600;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(255, 102, 0, 0.5);
        }

        #teamInfo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #00ff00;
            font-size: 12px;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            text-align: right;
        }

        .warning {
            color: #ff0000;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #controlsOverlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-size: 11px;
            text-align: center;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-item">
                <div>MIND STATUS</div>
                <div id="mindBar">
                    <div id="mindFill"></div>
                </div>
            </div>
            <div class="hud-item">
                <div>HEALTH: <span id="healthText">100%</span></div>
            </div>
            <div class="hud-item">
                <div id="statusText">OK</div>
            </div>
        </div>

        <div id="distanceText">
            ALLIES: <span id="allyDistance">0</span>м
        </div>

        <div id="teamInfo">
            <div>TEAM MEMBERS: <span id="teamCount">1</span>/4</div>
            <div>INFECTED: <span id="infectedCount">0</span></div>
        </div>

        <div id="inventory">
            <div>INVENTORY:</div>
            <div id="itemSlots"></div>
        </div>

        <div id="controlsOverlay">
            <div>WASD - Движение | SPACE - Взаимодействие | E - Прыжок</div>
            <div style="margin-top: 5px;">Q - Действие | LMB/RMB - Атака</div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
